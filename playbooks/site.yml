---
- name: Configure Passwordless Sudo
  hosts: all
  become: false
  tasks:
    - name: Set Up Sudoers File
      copy:
        dest: /etc/sudoers.d/ansible-nopasswd
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL"
        owner: root
        group: root
        mode: '0440'

- name: Base System Configuration
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Validate Sudoers File
      command: visudo -cf /etc/sudoers.d/ansible-nopasswd
      changed_when: false

    - name: Update All Packages
      dnf:
        name: '*'
        state: latest
        update_cache: yes

    - name: Install Essential Packages
      package:
        name:
          - python3
          - git
          - curl
          - wget
          - vim
          - firewalld
          - ansible-core
        state: present

    - name: Enable and Start Firewalld
      service:
        name: firewalld
        enabled: yes
        state: started

    - name: Configure Basic Firewall Rules
      firewalld:
        service: ssh
        permanent: yes
        state: enabled
        immediate: yes

    - name: Ensure SELinux is in Enforcing Mode
      selinux:
        policy: targeted
        state: enforcing

- name: Configure Web Servers
  hosts: web_servers
  become: true
  tasks:
    - name: Install Nginx
      package:
        name: nginx
        state: present

    - name: Create Unique Content For Each Server
      copy:
        content: "Hello from {{ inventory_hostname }}"
        dest: /usr/share/nginx/html/index.html
      notify: restart nginx

    - name: Open HTTP Port in Firewall
      firewalld:
        port: 80/tcp
        permanent: yes
        state: enabled
        immediate: yes

    - name: Ensure Nginx is Running
      service:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: restart nginx
      service:
        name: nginx
        state: restarted

- name: Configure HAProxy Load Balancer
  hosts: load_balancers
  become: true
  tasks:
    - name: Install HAProxy
      package:
        name: haproxy
        state: present

    - name: Configure HAProxy
      template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        owner: root
        group: root
        mode: '0644'
      notify: restart haproxy

    - name: Open HAProxy Ports
      firewalld:
        port: "{{ item }}"
        permanent: yes
        state: enabled
        immediate: yes
      loop:
        - "80/tcp"
        - "8080/tcp"

    - name: Ensure HAProxy is Running
      service:
        name: haproxy
        state: started
        enabled: yes

    - name: Install Keepalived
      package:
        name: keepalived
        state: present

    - name: Create Keepalived Configuration
      template:
        src: keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: '0640'
      notify: restart keepalived

    - name: Enable Non-Local IP Binding
      sysctl:
        name: net.ipv4.ip_nonlocal_bind
        value: '1'
        state: present
        reload: yes

    - name: Allow VRRP Protocol (UDP 112)
      firewalld:
        port: 112/udp
        permanent: yes
        state: enabled
        immediate: yes

    - name: Allow Multicast Traffic
      firewalld:
        rich_rule: 'rule family="ipv4" source address="224.0.0.0/24" accept'
        permanent: yes
        state: enabled
        immediate: yes

    - name: Ensure Correct Zone Assignment
      firewalld:
        zone: public
        interface: enp1s0
        permanent: yes
        state: enabled
        immediate: yes

    - name: Ensure Keepalived is Running
      service:
        name: keepalived
        state: started
        enabled: yes

  handlers:
    - name: restart haproxy
      service:
        name: haproxy
        state: restarted

    - name: restart keepalived
      service:
        name: keepalived
        state: restarted