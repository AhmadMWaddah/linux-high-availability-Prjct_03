global
    log /dev/log local0
    chroot /var/lib/haproxy
    user haproxy
    group haproxy
    daemon

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend http_front
    bind 192.168.222.200:80
    default_backend web_backend

backend web_backend
    balance roundrobin
    server WebServOne_VM 192.168.222.205:80 check
    server WebServTwo_VM 192.168.222.210:80 check

listen stats
    bind *:8080
    stats enable
    stats uri /haproxy?stats
